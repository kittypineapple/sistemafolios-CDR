{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-sm-10 col-md-6 col-lg-5">
        <div class="card p-4 rounded-4 shadow">

            <h4 class="text-center mb-4">Crear Usuario</h4>

            {% if error %}
                <div class="alert alert-danger text-center">{{ error }}</div>
            {% endif %}

            <form action="/admin/crear_usuario" method="post">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Rol</label>
                    <select name="rol" class="form-select" required>
                        <option value="operador">Operador</option>
                        <option value="consulta">Solo consulta</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-dark w-100">Crear Usuario</button>
            </form>

            <div class="mt-3 text-center">
                <a href="/admin/usuarios" class="text-decoration-none">Volver a usuarios</a>
            </div>

        </div>
    </div>
</div>
{% endblock %}
