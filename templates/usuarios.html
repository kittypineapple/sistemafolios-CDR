{% extends "base.html" %}

{% block content %}

<div style="max-width: 460px; margin: 0 auto;">

  <!-- Page header -->
  <div class="page-header">
    <div class="page-label"><i class="bi bi-person-plus"></i> Usuarios</div>
    <div class="page-title">Crear Usuario</div>
    <div class="page-desc">Agrega un nuevo usuario al sistema</div>
  </div>

  <div class="card-custom">
    <div class="card-header-custom">
      <div class="card-header-icon"><i class="bi bi-person-plus-fill"></i></div>
      <div>
        <p class="card-header-title">Nuevo usuario</p>
        <p class="card-header-sub">Define credenciales y rol de acceso</p>
      </div>
    </div>

    <div class="card-body-custom">

      {% if error %}
      <div class="error-inline" style="margin-bottom: 1.25rem;">
        <i class="bi bi-exclamation-circle-fill"></i> {{ error }}
      </div>
      {% endif %}

      <form action="/admin/crear_usuario" method="post">

        <div class="form-section">
          <div class="form-section-title"><i class="bi bi-person"></i> Credenciales</div>

          <div class="form-group">
            <label class="form-label-custom">Usuario</label>
            <input type="text" name="username" class="form-control-custom"
                   placeholder="Nombre de usuario" required autofocus>
          </div>

          <div class="form-group">
            <label class="form-label-custom">Contraseña</label>
            <div class="password-wrap">
              <input type="password" name="password" id="password"
                     class="form-control-custom" placeholder="••••••••" required>
              <button type="button" class="btn-eye" onclick="togglePassword()">
                <i class="bi bi-eye" id="eyeIcon"></i>
              </button>
            </div>
          </div>
        </div>

        <div class="form-section">
          <div class="form-section-title"><i class="bi bi-shield"></i> Rol</div>
          <div class="form-group">
            <label class="form-label-custom">Rol de acceso</label>
            <div class="select-wrapper">
              <select name="rol" class="form-select-custom" required>
                <option value="operador">Operador</option>
                <option value="consulta">Consulta</option>
                <option value="supervisor">Supervisor</option>
                <option value="admin">Administrador</option>
              </select>
            </div>
          </div>
        </div>

        <button type="submit" class="btn-generar">
          <i class="bi bi-person-check-fill"></i> Crear Usuario
        </button>

      </form>

      <a href="/admin/usuarios" class="link-back">
        <i class="bi bi-arrow-left"></i> Volver a usuarios
      </a>

    </div>
  </div>

</div>

<style>
  .password-wrap { position: relative; }
  .password-wrap .form-control-custom { padding-right: 2.8rem; }
  .btn-eye {
    position: absolute; right: 0.75rem; top: 50%;
    transform: translateY(-50%);
    background: none; border: none; color: #8aaa9a;
    cursor: pointer; font-size: 1rem; padding: 0;
    transition: color 0.2s;
  }
  .btn-eye:hover { color: #1e7d58; }

  .error-inline {
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 12px; padding: 0.85rem 1rem;
    color: #dc2626; font-size: 0.85rem;
    display: flex; align-items: center; gap: 0.6rem;
  }
</style>

<script>
  function togglePassword() {
    const input = document.getElementById('password');
    const icon  = document.getElementById('eyeIcon');
    if (input.type === 'password') {
      input.type = 'text';
      icon.classList.replace('bi-eye', 'bi-eye-slash');
    } else {
      input.type = 'password';
      icon.classList.replace('bi-eye-slash', 'bi-eye');
    }
  }
</script>

{% endblock %}
